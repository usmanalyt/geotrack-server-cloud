<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTrack | Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }

        .neon-border {
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
        }

        #map {
            height: 100vh;
            width: 100vw;
            z-index: 0;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(6, 182, 212, 0.5);
            border-radius: 3px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .custom-marker {
            background: rgba(6, 182, 212, 0.9);
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
        }

        /* Background Grid */
        .bg-mesh {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(76, 29, 149, 0.15) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(6, 182, 212, 0.15) 0%, transparent 25%);
            z-index: -2;
        }

        .grid-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            z-index: -1;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        /* Toast Animation */
        .toast-enter {
            transform: translateY(100px);
            opacity: 0;
        }
        .toast-enter-active {
            transform: translateY(0);
            opacity: 1;
            transition: all 0.3s ease;
        }
        .toast-exit {
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col relative">

    <!-- Background Elements -->
    <div class="bg-mesh"></div>
    <div class="grid-overlay"></div>

    <!-- Header -->
    <header class="glass-panel z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-location-crosshairs text-white"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-white tracking-tight">
                    Geo<span class="text-cyan-400">Track</span>
                </h1>
                <div class="connection-status">
                    <div class="status-dot" id="connectionDot"></div>
                    <span class="text-slate-400 text-xs" id="connectionText">Connecting...</span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <!-- Device Counter -->
            <div class="glass-card px-4 py-2 rounded-lg flex items-center gap-2">
                <i class="fa-solid fa-mobile-screen text-cyan-400"></i>
                <span class="text-white font-semibold" id="deviceCount">0</span>
                <span class="text-slate-500 text-xs">Active Devices</span>
            </div>

            <!-- Map Controls -->
            <div class="flex gap-2">
                <button id="wipeBtn" class="bg-red-500/20 hover:bg-red-500/40 text-red-400 border border-red-500/30 px-4 py-2 rounded-lg font-medium transition-all hover:shadow-lg hover:shadow-red-500/20">
                    <i class="fa-solid fa-trash-can mr-2"></i> Wipe
                </button>
                <button onclick="logout()" class="bg-slate-700/50 hover:bg-slate-600/50 text-white border border-slate-600 px-4 py-2 rounded-lg font-medium transition-all">
                    <i class="fa-solid fa-right-from-bracket mr-2"></i> Logout
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex-grow relative z-10">
        <div id="map" class="absolute inset-0"></div>
        
        <!-- Floating Info Panel -->
        <div class="absolute top-20 right-4 z-[1000] w-72 glass-panel rounded-xl p-4 shadow-2xl fade-in">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-white font-semibold text-sm">Live Tracking</h3>
                <span class="text-xs text-cyan-400">● LIVE</span>
            </div>
            <div class="space-y-3">
                <div class="flex items-center justify-between text-sm">
                    <span class="text-slate-400">Last Update</span>
                    <span class="text-white font-mono" id="lastUpdate">--:--:--</span>
                </div>
                <div class="flex items-center justify-between text-sm">
                    <span class="text-slate-400">Accuracy</span>
                    <span class="text-green-400 font-mono" id="accuracy">-- m</span>
                </div>
                <div class="flex items-center justify-between text-sm">
                    <span class="text-slate-400">Speed</span>
                    <span class="text-cyan-400 font-mono" id="speed">-- km/h</span>
                </div>
            </div>
            <div class="mt-4 pt-3 border-t border-slate-700">
                <div class="text-xs text-slate-500">
                    <i class="fa-solid fa-shield-halved mr-1"></i>
                    Encrypted Connection
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 glass-panel px-6 py-4 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-[10000]">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-circle-check text-green-400"></i>
            <span class="text-white text-sm" id="toastMessage">Action completed</span>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. AUTHENTICATION CHECK
        // ==========================================
        function checkAuth() {
            if (localStorage.getItem('geotrack_auth') !== 'true') {
                window.location.href = 'index.html';
            }
        }
        checkAuth();

        function logout() {
            localStorage.removeItem('geotrack_auth');
            window.location.href = 'index.html';
        }

        // ==========================================
        // 2. MAP CONFIGURATION
        // ==========================================
        const cleanMapStyle = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
            attribution: '&copy; CARTO'
        });

        const satelliteStyle = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        });

        const darkMapStyle = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
            attribution: '&copy; CARTO'
        });

        const map = L.map('map', {
            center: [4.2105, 101.9758],
            zoom: 6,
            layers: [cleanMapStyle],
            zoomControl: false,
            attributionControl: false
        });

        L.control.zoom({
            position: 'bottomright'
        }).addTo(map);

        L.control.layers({
            "🗺️ Standard": cleanMapStyle,
            "🌍 Satellite": satelliteStyle,
            "🌑 Dark Mode": darkMapStyle
        }).addTo(map);

        // ==========================================
        // 3. SOCKET CONNECTION & TRACKING
        // ==========================================
        const SERVER_URL = 'https://geotrack-server-cloud-1.onrender.com';
        const socket = io(SERVER_URL, {
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionDelay: 1000,
            reconnectionAttempts: 5
        });

        const deviceMarkers = {};
        const deviceInfo = {};

        // Connection Status
        socket.on('connect', () => {
            document.getElementById('connectionDot').classList.replace('bg-red-500', 'bg-green-500');
            document.getElementById('connectionText').textContent = 'Connected';
            showToast('Connected to server', 'success');
        });

        socket.on('disconnect', () => {
            document.getElementById('connectionDot').classList.replace('bg-green-500', 'bg-red-500');
            document.getElementById('connectionText').textContent = 'Disconnected';
            showToast('Connection lost', 'error');
        });

        socket.on('connect_error', (error) => {
            document.getElementById('connectionDot').classList.replace('bg-green-500', 'bg-red-500');
            document.getElementById('connectionText').textContent = 'Error';
            showToast('Connection error', 'error');
        });

// Update Map Pin
        function updateMapPin(deviceId, lat, lng, accuracy = 0, speed = 0) {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleTimeString();
            document.getElementById('accuracy').textContent = accuracy > 0 ? `${accuracy} m` : '-- m';
            document.getElementById('speed').textContent = speed > 0 ? `${speed} km/h` : '-- km/h';

            // 1. Check if marker exists, if not, create it FIRST
            if (deviceMarkers[deviceId]) {
                deviceMarkers[deviceId].setLatLng([lat, lng]);
            } else {
                const customIcon = L.divIcon({
                    className: 'custom-marker',
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                });

                deviceMarkers[deviceId] = L.marker([lat, lng], { icon: customIcon })
                    .addTo(map)
                    .bindPopup(`
                        <div class="text-center p-2">
                            <h3 class="font-bold text-white mb-1">Device: ${deviceId}</h3>
                            <p class="text-xs text-slate-400">Lat: ${lat.toFixed(6)}</p>
                            <p class="text-xs text-slate-400">Lng: ${lng.toFixed(6)}</p>
                            <p class="text-xs text-cyan-400 mt-1">● Live Tracking</p>
                        </div>
                    `);
            }
            
            // 2. NOW update the counter so the math is correct! (Fixes 0 Active Devices)
            document.getElementById('deviceCount').textContent = Object.keys(deviceMarkers).length;
            
            map.setView([lat, lng], 17);
        }

        // Fetch History
        fetch(`${SERVER_URL}/api/history`)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) {
                    const lastPoint = data[data.length - 1];
                    // 3. Just center the camera on the last known location. 
                    // Do NOT create a "fake" live pin from past history. (Fixes Ghost Pin)
                    map.setView([lastPoint.latitude, lastPoint.longitude], 16);
                }
            })
            .catch(err => console.error('Error fetching history:', err));

        // Real-time Updates
        socket.on('update-map', (data) => {
            updateMapPin(
                data.id, 
                data.latitude, 
                data.longitude,
                data.accuracy || 0,
                data.speed || 0
            );
        });

        // 4. THE MISSING DISCONNECT LISTENER (Removes pin when phone stops tracking)
        socket.on('device-disconnected', (deviceId) => {
            if (deviceMarkers[deviceId]) {
                map.removeLayer(deviceMarkers[deviceId]);
                delete deviceMarkers[deviceId];
                
                document.getElementById('deviceCount').textContent = Object.keys(deviceMarkers).length;
                
                document.getElementById('lastUpdate').textContent = "--:--:--";
                document.getElementById('accuracy').textContent = "-- m";
                document.getElementById('speed').textContent = "-- km/h";
                
                showToast('Tracker disconnected', 'error');
            }
        });

        // ==========================================
        // 4. WIPE MAP LOGIC
        // ==========================================
        document.getElementById('wipeBtn').addEventListener('click', () => {
            const pass = prompt('Enter Admin Password to wipe the database:');
            if (!pass) return;

            fetch(`${SERVER_URL}/api/history`, {
                method: 'DELETE',
                headers: { 'x-admin-key': pass }
            })
            .then(res => {
                if (res.ok) {
                    showToast('Database wiped successfully!', 'success');
                    for (let id in deviceMarkers) {
                        map.removeLayer(deviceMarkers[id]);
                        delete deviceMarkers[id];
                    }
                    document.getElementById('deviceCount').textContent = '0';
                } else {
                    showToast('Access Denied: Incorrect Password', 'error');
                }
            })
            .catch(err => {
                showToast('Error wiping database', 'error');
            });
        });

        // ==========================================
        // 5. UTILITY FUNCTIONS
         // ==========================================
        // 5. UTILITY FUNCTIONS
        // ==========================================
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            
            toastMsg.textContent = message;
            
            // Change icon based on success or error
            if (type === 'error') {
                icon.className = 'fa-solid fa-circle-xmark text-red-400';
            } else {
                icon.className = 'fa-solid fa-circle-check text-green-400';
            }

            // Slide toast up and fade in
            toast.classList.remove('opacity-0', 'translate-y-20');
            toast.classList.add('opacity-100', 'translate-y-0');

            // Hide after 3 seconds
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-20');
            }, 3000);
        }
    </script>
</body>
</html>
