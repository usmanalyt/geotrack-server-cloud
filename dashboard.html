<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C-Track | Live Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        /* UI Panel Styling */
        .glass-panel {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #map {
            height: 100vh;
            width: 100vw;
            z-index: 0;
        }

        /* Prevent Leaflet controls from hiding under mobile browser bars */
        .leaflet-control-container .leaflet-bottom { 
            bottom: 20px; 
        }

        /* Animations */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Dynamic Map Marker - Smooth Gliding */
        .leaflet-marker-icon {
            transition: transform 0.5s linear !important;
        }
    </style>
</head>
<body class="h-screen w-full relative">

    <header class="glass-panel z-[1000] absolute top-0 left-0 right-0 px-4 md:px-6 py-3 md:py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3 md:gap-4">
            <div class="w-8 h-8 md:w-10 md:h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-location-crosshairs text-white text-sm md:text-base"></i>
            </div>
            <div>
                <h1 class="text-lg md:text-xl font-bold text-white tracking-tight leading-tight">
                    C-<span class="text-cyan-400">Track</span>
                </h1>
                <div class="flex items-center gap-2 text-[10px] md:text-xs">
                    <div class="status-dot" id="connectionDot"></div>
                    <span class="text-slate-400" id="connectionText">Connecting...</span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-2 md:gap-4">
            <div class="glass-card px-3 py-1.5 md:px-4 md:py-2 rounded-lg flex items-center gap-2">
                <i class="fa-solid fa-mobile-screen text-cyan-400 text-sm"></i>
                <span class="text-white font-semibold text-sm md:text-base" id="deviceCount">0</span>
                <span class="hidden md:inline text-slate-500 text-xs">Active</span>
            </div>

            <div class="flex gap-2">
                <button id="togglePanelBtn" class="bg-indigo-500/20 hover:bg-indigo-500/40 text-indigo-400 border border-indigo-500/30 px-3 py-1.5 md:px-4 md:py-2 rounded-lg font-medium transition-all text-sm">
                    <i class="fa-solid fa-chart-simple md:mr-2"></i><span class="hidden md:inline"> Details</span>
                </button>
                <button id="wipeBtn" class="bg-red-500/20 hover:bg-red-500/40 text-red-400 border border-red-500/30 px-3 py-1.5 md:px-4 md:py-2 rounded-lg font-medium transition-all text-sm">
                    <i class="fa-solid fa-trash-can md:mr-2"></i><span class="hidden md:inline"> Wipe</span>
                </button>
                <button id="logoutBtn" class="bg-slate-700/50 hover:bg-slate-600/50 text-white border border-slate-600 px-3 py-1.5 md:px-4 md:py-2 rounded-lg font-medium transition-all text-sm">
                    <i class="fa-solid fa-right-from-bracket md:mr-2"></i><span class="hidden md:inline"> Logout</span>
                </button>
            </div>
        </div>
    </header>

    <div id="map" class="absolute inset-0"></div>
    
    <div id="infoPanel" class="absolute bottom-6 left-4 right-4 md:bottom-auto md:top-24 md:left-auto md:right-6 md:w-80 z-[1000] glass-panel rounded-xl p-4 md:p-5 shadow-2xl fade-in transition-all">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-white font-semibold text-sm md:text-base">Live Tracking</h3>
            <span class="text-xs font-bold text-cyan-400 tracking-wider">● LIVE</span>
        </div>
        <div class="space-y-3">
            <div class="flex items-center justify-between text-sm">
                <span class="text-slate-400"><i class="fa-regular fa-clock mr-2"></i>Last Update</span>
                <span class="text-white font-mono bg-slate-800/50 px-2 py-1 rounded" id="lastUpdate">--:--:--</span>
            </div>
            <div class="flex items-center justify-between text-sm">
                <span class="text-slate-400"><i class="fa-solid fa-map-location-dot mr-2"></i>Location</span>
                <span class="text-emerald-400 font-mono bg-emerald-500/10 px-2 py-1 rounded max-w-[140px] truncate" id="locationName" title="Waiting for GPS...">--</span>
            </div>
            <div class="flex items-center justify-between text-sm">
                <span class="text-slate-400"><i class="fa-solid fa-route mr-2"></i>Distance</span>
                <span class="text-indigo-400 font-mono bg-indigo-500/10 px-2 py-1 rounded" id="distance">--</span>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-24 md:bottom-6 left-4 md:left-auto md:right-6 glass-panel px-4 py-3 rounded-lg shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-[10000] flex items-center gap-3">
        <i class="fa-solid fa-circle-check text-green-400"></i>
        <span class="text-white text-sm" id="toastMessage">Action completed</span>
    </div>

    <script>
        // --- Auth Check ---
        if (localStorage.getItem('geotrack_auth') !== 'true') {
            window.location.href = 'index.html';
        }

        // --- Cache DOM Elements ---
        const ui = {
            panelToggleBtn: document.getElementById('togglePanelBtn'),
            wipeBtn: document.getElementById('wipeBtn'),
            logoutBtn: document.getElementById('logoutBtn'),
            infoPanel: document.getElementById('infoPanel'),
            connDot: document.getElementById('connectionDot'),
            connText: document.getElementById('connectionText'),
            deviceCount: document.getElementById('deviceCount'),
            lastUpdate: document.getElementById('lastUpdate'),
            locationName: document.getElementById('locationName'),
            distance: document.getElementById('distance'),
            toast: document.getElementById('toast'),
            toastMsg: document.getElementById('toastMessage')
        };

        // --- Event Listeners ---
        ui.logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('geotrack_auth');
            window.location.href = 'index.html';
        });

        ui.panelToggleBtn.addEventListener('click', () => {
            ui.infoPanel.classList.toggle('hidden');
        });

        // --- Map Initialization ---
        const mapLayers = {
            streets: L.tileLayer('http://mt0.google.com/vt/lyrs=m&hl=en&x={x}&y={y}&z={z}', { maxZoom: 22 }),
            satellite: L.tileLayer('http://mt0.google.com/vt/lyrs=y&hl=en&x={x}&y={y}&z={z}', { maxZoom: 22 }),
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 })
        };

        const map = L.map('map', {
            center: [4.2105, 101.9758], // Initial center (Malaysia)
            zoom: 6,
            layers: [mapLayers.streets], 
            zoomControl: false,
            attributionControl: false
        });

        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.control.layers({
            "🗺️ Google Streets": mapLayers.streets,
            "🌍 Google Satellite": mapLayers.satellite,
            "🌑 Dark Mode": mapLayers.dark
        }, null, { position: 'bottomright' }).addTo(map);

        // --- State Variables ---
        const SERVER_URL = 'https://geotrack-server-cloud-1.onrender.com';
        const socket = io(SERVER_URL, { transports: ['websocket', 'polling'], reconnection: true });
        const deviceMarkers = {};
        let adminLatLng = null;

        // Track local admin position to calculate distance to target
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(
                (pos) => adminLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude), 
                (err) => ui.distance.textContent = 'Blocked', 
                { enableHighAccuracy: true }
            );
        }

        // --- Utility Functions ---
        const showToast = (message, type = 'success') => {
            ui.toastMsg.textContent = message;
            const icon = ui.toast.querySelector('i');
            icon.className = type === 'error' ? 'fa-solid fa-circle-xmark text-red-400' : 'fa-solid fa-circle-check text-green-400';
            
            ui.toast.classList.remove('opacity-0', 'translate-y-20');
            ui.toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                ui.toast.classList.remove('opacity-100', 'translate-y-0');
                ui.toast.classList.add('opacity-0', 'translate-y-20');
            }, 3000);
        };

        // --- Socket & Core Logic ---
        socket.on('connect', () => {
            ui.connDot.classList.replace('bg-red-500', 'bg-green-500');
            ui.connText.textContent = 'Connected';
            showToast('Connected to server', 'success');
        });

        socket.on('disconnect', () => {
            ui.connDot.classList.replace('bg-green-500', 'bg-red-500');
            ui.connText.textContent = 'Disconnected';
            showToast('Connection lost', 'error');
        });

        const updateMapPin = (deviceId, lat, lng) => {
            ui.lastUpdate.textContent = new Date().toLocaleTimeString();
            const currentLatLng = L.latLng(lat, lng);
            
            if (adminLatLng) {
                const distMeters = adminLatLng.distanceTo(currentLatLng);
                ui.distance.textContent = distMeters > 1000 
                    ? (distMeters / 1000).toFixed(2) + ' km' 
                    : Math.round(distMeters) + ' m';
            }

            // 🎯 THE GOOGLE MAPS STYLE PIN
            const googlePinSvg = `
                <div class="cursor-pointer hover:scale-110 transition-transform drop-shadow-2xl" style="transform-origin: bottom center;">
                    <svg viewBox="0 0 24 24" width="46" height="46" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#1e3a8a" stroke="#ffffff" stroke-width="1.5" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" />
                        <circle cx="12" cy="9" r="3.5" fill="#ffffff" />
                    </svg>
                </div>
            `;

            if (deviceMarkers[deviceId]) {
                const marker = deviceMarkers[deviceId];
                
                const updatedIcon = L.divIcon({ 
                    className: 'bg-transparent border-0 flex items-center justify-center', 
                    html: googlePinSvg,
                    iconSize: [46, 46], 
                    iconAnchor: [23, 44] // Anchors perfectly to the sharp tip at the bottom
                });

                marker.setIcon(updatedIcon);
                marker.setLatLng([lat, lng]);

            } else {
                const customIcon = L.divIcon({ 
                    className: 'bg-transparent border-0 flex items-center justify-center', 
                    html: googlePinSvg,
                    iconSize: [46, 46], 
                    iconAnchor: [23, 44] 
                });
                
                deviceMarkers[deviceId] = L.marker([lat, lng], { icon: customIcon })
                    .addTo(map)
                    .bindPopup(`<div class="text-center p-2"><h3 class="font-bold text-slate-800 mb-1">Device: ${deviceId.substring(0,6)}</h3></div>`);
                
                deviceMarkers[deviceId].lastGeocode = L.latLng(0, 0);
            }

            const activeMarker = deviceMarkers[deviceId];
            if (activeMarker.lastGeocode.distanceTo(currentLatLng) > 50) {
                activeMarker.lastGeocode = currentLatLng;
                
                fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
                    .then(res => res.json())
                    .then(data => {
                        const place = data.name || data.address?.road || data.address?.neighbourhood || 
                                      data.address?.suburb || data.address?.city || 
                                      (data.display_name ? data.display_name.split(',')[0] : "Unknown Area");
                        
                        ui.locationName.textContent = place;
                        ui.locationName.title = data.display_name || place; 
                    })
                    .catch(err => console.warn("Geocoding failed", err));
            }
            
            ui.deviceCount.textContent = Object.keys(deviceMarkers).length;
            map.panTo([lat, lng]); 
        };

        fetch(`${SERVER_URL}/api/history`)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) {
                    const last = data[data.length - 1];
                    map.panTo([last.latitude, last.longitude]);
                }
            })
            .catch(err => console.error('History fetch error:', err));

        socket.on('update-map', (data) => updateMapPin(data.id, data.latitude, data.longitude));

        socket.on('device-disconnected', (deviceId) => {
            if (deviceMarkers[deviceId]) {
                map.removeLayer(deviceMarkers[deviceId]);
                delete deviceMarkers[deviceId];
                
                ui.deviceCount.textContent = Object.keys(deviceMarkers).length;
                ui.lastUpdate.textContent = "--:--:--";
                ui.locationName.textContent = "--";
                ui.distance.textContent = "--";
                
                showToast('Tracker disconnected', 'error');
            }
        });

        ui.wipeBtn.addEventListener('click', () => {
            const pass = prompt('Enter Admin Password to wipe the database:');
            if (!pass) return;

            fetch(`${SERVER_URL}/api/history`, { method: 'DELETE', headers: { 'x-admin-key': pass } })
                .then(res => {
                    if (res.ok) {
                        showToast('Database wiped successfully!');
                        for (let id in deviceMarkers) { 
                            map.removeLayer(deviceMarkers[id]); 
                            delete deviceMarkers[id]; 
                        }
                        ui.deviceCount.textContent = '0';
                    } else {
                        showToast('Access Denied: Incorrect Password', 'error');
                    }
                })
                .catch(err => showToast('Error wiping database', 'error'));
        });
    </script>
</body>
</html>
