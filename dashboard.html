<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C-Track | Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #map {
            height: 100vh;
            width: 100vw;
            z-index: 0;
        }

        .leaflet-control-container .leaflet-bottom { bottom: 20px; }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Smoothly pan the marker across the map */
        .leaflet-marker-icon {
            transition: transform 0.5s linear !important;
        }

        /* 🎯 NEW: Removed the static rotation so the Javascript can spin it dynamically! */
        .nav-arrow {
            color: #06b6d4;
            font-size: 28px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5));
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.6s ease-out; /* Makes the spinning look smooth */
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="h-screen w-full relative">

    <header class="glass-panel z-[1000] absolute top-0 left-0 right-0 px-4 md:px-6 py-3 md:py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3 md:gap-4">
            <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-location-crosshairs text-white text-sm md:text-base"></i>
            </div>
            <div>
                <h1 class="text-lg md:text-xl font-bold text-white tracking-tight leading-tight">
    C-<span class="text-cyan-400">Track</span>
            </h1>
                <div class="flex items-center gap-2 text-[10px] md:text-xs">
                    <div class="status-dot" id="connectionDot"></div>
                    <span class="text-slate-400" id="connectionText">Connecting...</span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-2 md:gap-4">
            <div class="glass-card px-3 py-1.5 md:px-4 md:py-2 rounded-lg flex items-center gap-2">
                <i class="fa-solid fa-mobile-screen text-cyan-400 text-sm"></i>
                <span class="text-white font-semibold text-sm md:text-base" id="deviceCount">0</span>
                <span class="hidden md:inline text-slate-500 text-xs">Active</span>
            </div>

            <div class="flex gap-2">
                <button id="togglePanelBtn" class="bg-indigo-500/20 hover:bg-indigo-500/40 text-indigo-400 border border-indigo-500/30 px-3 py-1.5 md:px-4 md:py-2 rounded-lg font-medium transition-all text-sm">
                    <i class="fa-solid fa-chart-simple md:mr-2"></i><span class="hidden md:inline"> Details</span>
                </button>
                <button id="wipeBtn" class="bg-red-500/20 hover:bg-red-500/40 text-red-400 border border-red-500/30 px-3 py-1.5 md:px-4 md:py-2 rounded-lg font-medium transition-all text-sm">
                    <i class="fa-solid fa-trash-can md:mr-2"></i><span class="hidden md:inline"> Wipe</span>
                </button>
                <button onclick="logout()" class="bg-slate-700/50 hover:bg-slate-600/50 text-white border border-slate-600 px-3 py-1.5 md:px-4 md:py-2 rounded-lg font-medium transition-all text-sm">
                    <i class="fa-solid fa-right-from-bracket md:mr-2"></i><span class="hidden md:inline"> Logout</span>
                </button>
            </div>
        </div>
    </header>

    <div id="map" class="absolute inset-0"></div>
    
    <div id="infoPanel" class="absolute bottom-6 left-4 right-4 md:bottom-auto md:top-24 md:left-auto md:right-6 md:w-80 z-[1000] glass-panel rounded-xl p-4 md:p-5 shadow-2xl fade-in transition-all">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-white font-semibold text-sm md:text-base">Live Tracking</h3>
            <span class="text-xs font-bold text-cyan-400 tracking-wider">● LIVE</span>
        </div>
        <div class="space-y-3">
            <div class="flex items-center justify-between text-sm">
                <span class="text-slate-400"><i class="fa-regular fa-clock mr-2"></i>Last Update</span>
                <span class="text-white font-mono bg-slate-800/50 px-2 py-1 rounded" id="lastUpdate">--:--:--</span>
            </div>
            <div class="flex items-center justify-between text-sm">
                <span class="text-slate-400"><i class="fa-solid fa-map-location-dot mr-2"></i>Location</span>
                <span class="text-emerald-400 font-mono bg-emerald-500/10 px-2 py-1 rounded max-w-[140px] truncate" id="locationName" title="Waiting for GPS...">--</span>
            </div>
            <div class="flex items-center justify-between text-sm">
                <span class="text-slate-400"><i class="fa-solid fa-route mr-2"></i>Distance</span>
                <span class="text-indigo-400 font-mono bg-indigo-500/10 px-2 py-1 rounded" id="distance">--</span>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-24 md:bottom-6 left-4 md:left-auto md:right-6 glass-panel px-4 py-3 rounded-lg shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-[10000] flex items-center gap-3">
        <i class="fa-solid fa-circle-check text-green-400"></i>
        <span class="text-white text-sm" id="toastMessage">Action completed</span>
    </div>

    <script>
        function checkAuth() {
            if (localStorage.getItem('geotrack_auth') !== 'true') window.location.href = 'index.html';
        }
        checkAuth();

        function logout() {
            localStorage.removeItem('geotrack_auth');
            window.location.href = 'index.html';
        }

        document.getElementById('togglePanelBtn').addEventListener('click', () => {
            const panel = document.getElementById('infoPanel');
            panel.classList.toggle('hidden');
        });

        const googleStreets = L.tileLayer('http://mt0.google.com/vt/lyrs=m&hl=en&x={x}&y={y}&z={z}', { maxZoom: 22 });
        const googleHybrid = L.tileLayer('http://mt0.google.com/vt/lyrs=y&hl=en&x={x}&y={y}&z={z}', { maxZoom: 22 });
        const darkMapStyle = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 });

        const map = L.map('map', {
            center: [4.2105, 101.9758],
            zoom: 6,
            layers: [googleStreets], 
            zoomControl: false,
            attributionControl: false
        });

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.control.layers({
            "🗺️ Google Streets": googleStreets,
            "🌍 Google Satellite": googleHybrid,
            "🌑 Dark Mode": darkMapStyle
        }, null, { position: 'bottomright' }).addTo(map);

        // Track Admin Location for Distance Math
        let adminLatLng = null;
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((pos) => {
                adminLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
            }, (err) => {
                document.getElementById('distance').textContent = 'Blocked';
            }, { enableHighAccuracy: true });
        }

        // 🎯 NEW: The Mathematics to calculate exact Compass Heading (Bearing)
        function calculateBearing(startLat, startLng, destLat, destLng) {
            const toRad = (deg) => (deg * Math.PI) / 180;
            const toDeg = (rad) => (rad * 180) / Math.PI;

            const startLatRad = toRad(startLat);
            const startLngRad = toRad(startLng);
            const destLatRad = toRad(destLat);
            const destLngRad = toRad(destLng);

            const y = Math.sin(destLngRad - startLngRad) * Math.cos(destLatRad);
            const x = Math.cos(startLatRad) * Math.sin(destLatRad) -
                      Math.sin(startLatRad) * Math.cos(destLatRad) * Math.cos(destLngRad - startLngRad);

            const brng = toDeg(Math.atan2(y, x));
            return (brng + 360) % 360; // Returns an angle between 0 and 360 degrees
        }

        const SERVER_URL = 'https://geotrack-server-cloud-1.onrender.com';
        const socket = io(SERVER_URL, {
            transports: ['websocket', 'polling'],
            reconnection: true
        });

        const deviceMarkers = {};

        socket.on('connect', () => {
            document.getElementById('connectionDot').classList.replace('bg-red-500', 'bg-green-500');
            document.getElementById('connectionText').textContent = 'Connected';
            showToast('Connected to server', 'success');
        });

        socket.on('disconnect', () => {
            document.getElementById('connectionDot').classList.replace('bg-green-500', 'bg-red-500');
            document.getElementById('connectionText').textContent = 'Disconnected';
            showToast('Connection lost', 'error');
        });

        function updateMapPin(deviceId, lat, lng) {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleTimeString();

            const currentLatLng = L.latLng(lat, lng);
            
            if (adminLatLng) {
                const distMeters = adminLatLng.distanceTo(currentLatLng);
                const distText = distMeters > 1000 ? (distMeters / 1000).toFixed(2) + ' km' : Math.round(distMeters) + ' m';
                document.getElementById('distance').textContent = distText;
            }

            // 🎯 NEW: Rotate the Marker based on movement!
            if (deviceMarkers[deviceId]) {
                const oldLatLng = deviceMarkers[deviceId].getLatLng();
                const distMoved = oldLatLng.distanceTo(currentLatLng);
                
                // Retrieve the last known angle, default to 0
                let currentAngle = deviceMarkers[deviceId].options.bearing || 0;
                
                // Only spin the arrow if they actually moved a few meters (prevents jitter spinning while standing still)
                if (distMoved > 2) {
                    currentAngle = calculateBearing(oldLatLng.lat, oldLatLng.lng, lat, lng);
                }

                // Create the updated icon with the new rotation
                // (We subtract 45 degrees because the FontAwesome icon natively points to the top-right)
                const updatedIcon = L.divIcon({ 
                    className: 'bg-transparent border-0', 
                    html: `<div class="nav-arrow" style="transform: rotate(${currentAngle - 45}deg);"><i class="fa-solid fa-location-arrow"></i></div>`,
                    iconSize: [30, 30], 
                    iconAnchor: [15, 15] 
                });

                deviceMarkers[deviceId].setIcon(updatedIcon);
                deviceMarkers[deviceId].setLatLng([lat, lng]);
                deviceMarkers[deviceId].options.bearing = currentAngle; // Save for next time

            } else {
                // If it's a brand new connection, just point it North initially
                const customIcon = L.divIcon({ 
                    className: 'bg-transparent border-0', 
                    html: `<div class="nav-arrow" style="transform: rotate(-45deg);"><i class="fa-solid fa-location-arrow"></i></div>`,
                    iconSize: [30, 30], 
                    iconAnchor: [15, 15] 
                });
                deviceMarkers[deviceId] = L.marker([lat, lng], { icon: customIcon }).addTo(map)
                    .bindPopup(`<div class="text-center p-2"><h3 class="font-bold text-slate-800 mb-1">Device: ${deviceId.substring(0,6)}</h3></div>`);
                
                deviceMarkers[deviceId].lastGeocode = L.latLng(0, 0);
                deviceMarkers[deviceId].options.bearing = 0;
            }

            // 🎯 NEW: Smarter Reverse Geocoding
            const marker = deviceMarkers[deviceId];
            if (marker.lastGeocode.distanceTo(currentLatLng) > 50) {
                marker.lastGeocode = currentLatLng;
                fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
                    .then(res => res.json())
                    .then(data => {
                        // Much broader net to catch the location name!
                        const placeName = data.name || data.address?.road || data.address?.neighbourhood || data.address?.suburb || data.address?.village || data.address?.town || data.address?.city || data.address?.county || (data.display_name ? data.display_name.split(',')[0] : "Unnamed Area");
                        const locElement = document.getElementById('locationName');
                        locElement.textContent = placeName;
                        locElement.title = data.display_name; 
                    }).catch(err => console.log("Geocoding failed"));
            }
            
            document.getElementById('deviceCount').textContent = Object.keys(deviceMarkers).length;
            map.panTo([lat, lng]); 
        }

        fetch(`${SERVER_URL}/api/history`)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) map.panTo([data[data.length - 1].latitude, data[data.length - 1].longitude]);
            })
            .catch(err => console.error('Error fetching history:', err));

        socket.on('update-map', (data) => updateMapPin(data.id, data.latitude, data.longitude));

        socket.on('device-disconnected', (deviceId) => {
            if (deviceMarkers[deviceId]) {
                map.removeLayer(deviceMarkers[deviceId]);
                delete deviceMarkers[deviceId];
                
                document.getElementById('deviceCount').textContent = Object.keys(deviceMarkers).length;
                document.getElementById('lastUpdate').textContent = "--:--:--";
                document.getElementById('locationName').textContent = "--";
                document.getElementById('distance').textContent = "--";
                showToast('Tracker disconnected', 'error');
            }
        });

        document.getElementById('wipeBtn').addEventListener('click', () => {
            const pass = prompt('Enter Admin Password to wipe the database:');
            if (!pass) return;

            fetch(`${SERVER_URL}/api/history`, { method: 'DELETE', headers: { 'x-admin-key': pass } })
            .then(res => {
                if (res.ok) {
                    showToast('Database wiped successfully!', 'success');
                    for (let id in deviceMarkers) { map.removeLayer(deviceMarkers[id]); delete deviceMarkers[id]; }
                    document.getElementById('deviceCount').textContent = '0';
                } else {
                    showToast('Access Denied: Incorrect Password', 'error');
                }
            })
            .catch(err => showToast('Error wiping database', 'error'));
        });

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.querySelector('span').textContent = message;
            toast.querySelector('i').className = type === 'error' ? 'fa-solid fa-circle-xmark text-red-400' : 'fa-solid fa-circle-check text-green-400';
            toast.classList.remove('opacity-0', 'translate-y-20');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-20');
            }, 3000);
        }
    </script>
</body>
</html>
