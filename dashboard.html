<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoTrack | Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #map {
            height: 100vh;
            width: 100vw;
            z-index: 0;
        }

        /* Shift the bottom-right controls up slightly so they don't hide behind mobile browsers */
        .leaflet-control-container .leaflet-bottom { bottom: 20px; }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .custom-marker {
            background: #06b6d4;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.8), 0 0 30px rgba(6, 182, 212, 0.4);
            transition: all 0.3s ease;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="h-screen w-full relative">

    <header class="glass-panel z-[1000] absolute top-0 left-0 right-0 px-4 md:px-6 py-3 md:py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3 md:gap-4">
            <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-location-crosshairs text-white text-sm md:text-base"></i>
            </div>
            <div>
                <h1 class="text-lg md:text-xl font-bold text-white tracking-tight leading-tight">
                    Geo<span class="text-cyan-400">Track</span>
                </h1>
                <div class="flex items-center gap-2 text-[10px] md:text-xs">
                    <div class="status-dot" id="connectionDot"></div>
                    <span class="text-slate-400" id="connectionText">Connecting...</span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-2 md:gap-4">
            <div class="glass-card px-3 py-1.5 md:px-4 md:py-2 rounded-lg flex items-center gap-2">
                <i class="fa-solid fa-mobile-screen text-cyan-400 text-sm"></i>
                <span class="text-white font-semibold text-sm md:text-base" id="deviceCount">0</span>
                <span class="hidden md:inline text-slate-500 text-xs">Active</span>
            </div>

            <div class="flex gap-2">
                <button id="togglePanelBtn" class="bg-indigo-500/20 hover:bg-indigo-500/40 text-indigo-400 border border-indigo-500/30 px-3 py-1.5 md:px-4 md:py-2 rounded-lg font-medium transition-all text-sm">
                    <i class="fa-solid fa-chart-simple md:mr-2"></i><span class="hidden md:inline"> Details</span>
                </button>

                <button id="wipeBtn" class="bg-red-500/20 hover:bg-red-500/40 text-red-400 border border-red-500/30 px-3 py-1.5 md:px-4 md:py-2 rounded-lg font-medium transition-all text-sm">
                    <i class="fa-solid fa-trash-can md:mr-2"></i><span class="hidden md:inline"> Wipe</span>
                </button>
                <button onclick="logout()" class="bg-slate-700/50 hover:bg-slate-600/50 text-white border border-slate-600 px-3 py-1.5 md:px-4 md:py-2 rounded-lg font-medium transition-all text-sm">
                    <i class="fa-solid fa-right-from-bracket md:mr-2"></i><span class="hidden md:inline"> Logout</span>
                </button>
            </div>
        </div>
    </header>

    <div id="map" class="absolute inset-0"></div>
    
    <div id="infoPanel" class="absolute bottom-6 left-4 right-4 md:bottom-auto md:top-24 md:left-auto md:right-6 md:w-80 z-[1000] glass-panel rounded-xl p-4 md:p-5 shadow-2xl fade-in transition-all">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-white font-semibold text-sm md:text-base">Live Tracking</h3>
            <span class="text-xs font-bold text-cyan-400 tracking-wider">● LIVE</span>
        </div>
        <div class="space-y-3">
            <div class="flex items-center justify-between text-sm">
                <span class="text-slate-400"><i class="fa-regular fa-clock mr-2"></i>Last Update</span>
                <span class="text-white font-mono bg-slate-800/50 px-2 py-1 rounded" id="lastUpdate">--:--:--</span>
            </div>
            <div class="flex items-center justify-between text-sm">
                <span class="text-slate-400"><i class="fa-solid fa-crosshairs mr-2"></i>Accuracy</span>
                <span class="text-green-400 font-mono bg-green-500/10 px-2 py-1 rounded" id="accuracy">-- m</span>
            </div>
            <div class="flex items-center justify-between text-sm">
                <span class="text-slate-400"><i class="fa-solid fa-gauge-high mr-2"></i>Speed</span>
                <span class="text-cyan-400 font-mono bg-cyan-500/10 px-2 py-1 rounded" id="speed">-- km/h</span>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-24 md:bottom-6 left-4 md:left-auto md:right-6 glass-panel px-4 py-3 rounded-lg shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-[10000] flex items-center gap-3">
        <i class="fa-solid fa-circle-check text-green-400"></i>
        <span class="text-white text-sm" id="toastMessage">Action completed</span>
    </div>

    <script>
        // ==========================================
        // 1. AUTHENTICATION & UI TOGGLES
        // ==========================================
        function checkAuth() {
            if (localStorage.getItem('geotrack_auth') !== 'true') window.location.href = 'index.html';
        }
        checkAuth();

        function logout() {
            localStorage.removeItem('geotrack_auth');
            window.location.href = 'index.html';
        }

        // 🎯 NEW: Toggle the details panel when the button is clicked
        document.getElementById('togglePanelBtn').addEventListener('click', () => {
            const panel = document.getElementById('infoPanel');
            panel.classList.toggle('hidden');
        });

        // ==========================================
        // 2. PREMIUM MAP CONFIGURATION
        // ==========================================
        const googleStreets = L.tileLayer('http://mt0.google.com/vt/lyrs=m&hl=en&x={x}&y={y}&z={z}', { maxZoom: 22 });
        const googleHybrid = L.tileLayer('http://mt0.google.com/vt/lyrs=y&hl=en&x={x}&y={y}&z={z}', { maxZoom: 22 });
        const darkMapStyle = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 });

        const map = L.map('map', {
            center: [4.2105, 101.9758],
            zoom: 6,
            layers: [googleStreets], 
            zoomControl: false,
            attributionControl: false
        });

        // 🎯 NEW: Move zoom and layer controls OUT of the way to the Bottom Right
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.control.layers({
            "🗺️ Google Streets": googleStreets,
            "🌍 Google Satellite": googleHybrid,
            "🌑 Dark Mode": darkMapStyle
        }, null, { position: 'bottomright' }).addTo(map);

        // ==========================================
        // 3. SOCKET CONNECTION, TRACKING & TRAILS
        // ==========================================
        const SERVER_URL = 'https://geotrack-server-cloud-1.onrender.com';
        const socket = io(SERVER_URL, {
            transports: ['websocket', 'polling'],
            reconnection: true
        });

        const deviceMarkers = {};
        const deviceTrails = {};

        socket.on('connect', () => {
            document.getElementById('connectionDot').classList.replace('bg-red-500', 'bg-green-500');
            document.getElementById('connectionText').textContent = 'Connected';
            showToast('Connected to server', 'success');
        });

        socket.on('disconnect', () => {
            document.getElementById('connectionDot').classList.replace('bg-green-500', 'bg-red-500');
            document.getElementById('connectionText').textContent = 'Disconnected';
            showToast('Connection lost', 'error');
        });

        function updateMapPin(deviceId, lat, lng, accuracy = 0, speed = 0) {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleTimeString();
            document.getElementById('accuracy').textContent = accuracy > 0 ? `${accuracy.toFixed(1)} m` : '-- m';
            document.getElementById('speed').textContent = speed > 0 ? `${speed.toFixed(1)} km/h` : '-- km/h';

            // 1. Pin Update
            if (deviceMarkers[deviceId]) {
                deviceMarkers[deviceId].setLatLng([lat, lng]);
            } else {
                const customIcon = L.divIcon({ className: 'custom-marker', iconSize: [20, 20], iconAnchor: [10, 10] });
                deviceMarkers[deviceId] = L.marker([lat, lng], { icon: customIcon }).addTo(map)
                    .bindPopup(`<div class="text-center p-2"><h3 class="font-bold text-slate-800 mb-1">Device: ${deviceId.substring(0,6)}</h3></div>`);
            }
            
            // 2. Trail Update
            if (deviceTrails[deviceId]) {
                deviceTrails[deviceId].addLatLng([lat, lng]);
            } else {
                deviceTrails[deviceId] = L.polyline([[lat, lng]], {
                    color: '#06b6d4', weight: 4, opacity: 0.8, lineJoin: 'round', dashArray: '10, 10'
                }).addTo(map);
            }
            
            document.getElementById('deviceCount').textContent = Object.keys(deviceMarkers).length;
            map.setView([lat, lng], 18); 
        }

        fetch(`${SERVER_URL}/api/history`)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) map.setView([data[data.length - 1].latitude, data[data.length - 1].longitude], 16);
            })
            .catch(err => console.error('Error fetching history:', err));

        socket.on('update-map', (data) => updateMapPin(data.id, data.latitude, data.longitude, data.accuracy, data.speed));

        socket.on('device-disconnected', (deviceId) => {
            if (deviceMarkers[deviceId]) {
                map.removeLayer(deviceMarkers[deviceId]);
                delete deviceMarkers[deviceId];
                
                if (deviceTrails[deviceId]) {
                    map.removeLayer(deviceTrails[deviceId]);
                    delete deviceTrails[deviceId];
                }
                
                document.getElementById('deviceCount').textContent = Object.keys(deviceMarkers).length;
                document.getElementById('lastUpdate').textContent = "--:--:--";
                document.getElementById('accuracy').textContent = "-- m";
                document.getElementById('speed').textContent = "-- km/h";
                showToast('Tracker disconnected', 'error');
            }
        });

        // ==========================================
        // 4. WIPE MAP LOGIC
        // ==========================================
        document.getElementById('wipeBtn').addEventListener('click', () => {
            const pass = prompt('Enter Admin Password to wipe the database:');
            if (!pass) return;

            fetch(`${SERVER_URL}/api/history`, { method: 'DELETE', headers: { 'x-admin-key': pass } })
            .then(res => {
                if (res.ok) {
                    showToast('Database wiped successfully!', 'success');
                    for (let id in deviceMarkers) { map.removeLayer(deviceMarkers[id]); delete deviceMarkers[id]; }
                    for (let id in deviceTrails) { map.removeLayer(deviceTrails[id]); delete deviceTrails[id]; }
                    document.getElementById('deviceCount').textContent = '0';
                } else {
                    showToast('Access Denied: Incorrect Password', 'error');
                }
            })
            .catch(err => showToast('Error wiping database', 'error'));
        });

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.querySelector('span').textContent = message;
            toast.querySelector('i').className = type === 'error' ? 'fa-solid fa-circle-xmark text-red-400' : 'fa-solid fa-circle-check text-green-400';
            toast.classList.remove('opacity-0', 'translate-y-20');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-20');
            }, 3000);
        }
    </script>
</body>
</html>
