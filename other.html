<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTrack - Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
        }
        /* The Glass Effect */
        .glass-card {
            background: rgba(15, 23, 42, 0.4); /* Dark translucent */
            backdrop-filter: blur(16px);       /* Frosted glass blur */
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Custom Input Styling */
        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(99, 102, 241, 0.5); /* Indigo glow */
            outline: none;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }
        /* Custom Button */
        .primary-btn {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            transition: all 0.3s ease;
        }
        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative bg-slate-900" style="background-image: url('https://images.unsplash.com/photo-1519389950473-47ba0277781c?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center;">
    
    <div class="absolute inset-0 bg-slate-900/60 z-0"></div>

    <div class="glass-card rounded-3xl w-full max-w-md p-8 relative z-10 flex flex-col items-center">
        
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center mb-6 shadow-lg">
            <i class="fa-solid fa-location-crosshairs text-white text-xl"></i>
        </div>

        <div id="signInSection" class="w-full">
            <h2 class="text-2xl font-bold text-white text-center tracking-tight mb-2">Login to GeoTrack</h2>
            <p class="text-slate-400 text-sm text-center mb-8">Enter your credentials to access the dashboard</p>
            
            <form id="signInForm" class="space-y-5">
                <div>
                    <p class="text-xs font-semibold text-slate-300 mb-2 uppercase tracking-wider ml-1">Email Address</p>
                    <input type="email" id="inEmail" required class="glass-input w-full rounded-xl px-4 py-3 placeholder-slate-500" placeholder="admin@geotrack.com">
                </div>
                <div>
                    <p class="text-xs font-semibold text-slate-300 mb-2 uppercase tracking-wider ml-1">Password</p>
                    <input type="password" id="inPassword" required class="glass-input w-full rounded-xl px-4 py-3 placeholder-slate-500" placeholder="••••••••">
                </div>
                
                <button type="submit" class="primary-btn w-full text-white font-semibold py-3.5 rounded-xl mt-4">
                    Get Started
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-slate-400">Don't have an Account? 
                    <button id="showSignUp" class="text-indigo-400 font-semibold hover:text-indigo-300 transition pl-1">Sign up</button>
                </p>
            </div>
        </div>

        <div id="signUpSection" class="w-full hidden">
            <h2 class="text-2xl font-bold text-white text-center tracking-tight mb-2">Create Account</h2>
            <p class="text-slate-400 text-sm text-center mb-8">Register a new tracking admin</p>
            
            <form id="signUpForm" class="space-y-5">
                <div>
                    <p class="text-xs font-semibold text-slate-300 mb-2 uppercase tracking-wider ml-1">Email Address</p>
                    <input type="email" id="upEmail" required class="glass-input w-full rounded-xl px-4 py-3 placeholder-slate-500" placeholder="newuser@geotrack.com">
                </div>
                <div>
                    <p class="text-xs font-semibold text-slate-300 mb-2 uppercase tracking-wider ml-1">Password</p>
                    <input type="password" id="upPassword" required class="glass-input w-full rounded-xl px-4 py-3 placeholder-slate-500" placeholder="Create password">
                </div>
                
                <button type="submit" class="primary-btn w-full text-white font-semibold py-3.5 rounded-xl mt-4">
                    Create Account
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-slate-400">Already have an account? 
                    <button id="showSignIn" class="text-indigo-400 font-semibold hover:text-indigo-300 transition pl-1">Sign in</button>
                </p>
            </div>
        </div>

        <p id="errorMsg" class="text-red-400 text-sm mt-5 hidden text-center font-medium bg-red-500/10 py-2 px-4 rounded-lg w-full"></p>
        <p id="successMsg" class="text-green-400 text-sm mt-5 hidden text-center font-medium bg-green-500/10 py-2 px-4 rounded-lg w-full"></p>

    </div>

    <script>
        const signInSection = document.getElementById('signInSection');
        const signUpSection = document.getElementById('signUpSection');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        function clearMessages() {
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');
        }

        // Toggle Views
        document.getElementById('showSignUp').addEventListener('click', () => {
            signInSection.classList.add('hidden');
            signUpSection.classList.remove('hidden');
            clearMessages();
        });

        document.getElementById('showSignIn').addEventListener('click', () => {
            signUpSection.classList.add('hidden');
            signInSection.classList.remove('hidden');
            clearMessages();
        });

        // Sign Up Logic
        document.getElementById('signUpForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('upEmail').value;
            const password = document.getElementById('upPassword').value;

            let users = JSON.parse(localStorage.getItem('geotrack_users')) || {};
            
            if (users[email]) {
                errorMsg.textContent = "Email already registered!";
                errorMsg.classList.remove('hidden');
            } else {
                users[email] = password;
                localStorage.setItem('geotrack_users', JSON.stringify(users));
                
                document.getElementById('upEmail').value = '';
                document.getElementById('upPassword').value = '';
                
                successMsg.textContent = "Account created! Please sign in.";
                successMsg.classList.remove('hidden');
                setTimeout(() => document.getElementById('showSignIn').click(), 1500);
            }
        });

       // Upgraded Sign Up Logic (Cloud MongoDB)
        document.getElementById('signUpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('upEmail').value;
            const password = document.getElementById('upPassword').value;

            try {
                // Send the data to your live Render server!
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();

                if (!response.ok) {
                    errorMsg.textContent = data.error;
                    errorMsg.classList.remove('hidden');
                } else {
                    document.getElementById('upEmail').value = '';
                    document.getElementById('upPassword').value = '';
                    successMsg.textContent = "Account created! Please sign in.";
                    successMsg.classList.remove('hidden');
                    setTimeout(() => document.getElementById('showSignIn').click(), 1500);
                }
            } catch (err) {
                errorMsg.textContent = "Could not connect to server.";
                errorMsg.classList.remove('hidden');
            }
        });

        // Upgraded Sign In Logic (Cloud MongoDB)
        document.getElementById('signInForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('inEmail').value;
            const password = document.getElementById('inPassword').value;
            
            try {
                // Ask the server if this user exists
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorMsg.textContent = data.error;
                    errorMsg.classList.remove('hidden');
                } else {
                    // Success! Give them the golden ticket and send them to the dashboard
                    localStorage.setItem('geotrack_auth', 'true');
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                errorMsg.textContent = "Could not connect to server.";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
